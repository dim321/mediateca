name: "mediateca"

services:
  rails-app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
    - ../../mediateca:/workspaces/mediateca:cached

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Run as vscode so Ruby/bundler (installed via mise) are in PATH for postCreateCommand and dev workflow.
    user: vscode

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)
    depends_on:
    - selenium
    - postgres

  selenium:
    image: selenium/standalone-chromium
    restart: unless-stopped

  postgres:
    image: postgres:18
    restart: unless-stopped
    networks:
    - default
    volumes:
    - ~/docker-volumes/mediateca/docker_data/postgres_data:/var/lib/postgresql
#    - postgres-data:/var/lib/postgresql
    ports:
    - "5432:5432"
    environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres

volumes:
  postgres-data:
