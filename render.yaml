databases:
  - name: mediateca
    databaseName: mediateca
    user: mediateca
    plan: free

services:
  - type: web
    plan: free
    name: mediateca
    env: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mediateca
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
