test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# MinIO for development (S3-compatible)
minio:
  service: S3
  access_key_id: <%= ENV.fetch("MINIO_ACCESS_KEY", "minioadmin") %>
  secret_access_key: <%= ENV.fetch("MINIO_SECRET_KEY", "minioadmin") %>
  region: us-east-1
  bucket: <%= ENV.fetch("MINIO_BUCKET", "mediateca-dev") %>
  endpoint: <%= ENV.fetch("MINIO_ENDPOINT", "http://localhost:9000") %>
  force_path_style: true

# Yandex Object Storage (S3-compatible) — production Active Storage (:yandex in production.rb).
# Production: set YC_ACCESS_KEY_ID and YC_SECRET_ACCESS_KEY in the container (Kamal secrets / .env.deploy.example).
# Other environments often use :local/:test; defaults below only allow YAML to load when those env vars are absent.
yandex:
  service: S3
  access_key_id: <%= ENV.fetch("YC_ACCESS_KEY_ID", "unset") %>
  secret_access_key: <%= ENV.fetch("YC_SECRET_ACCESS_KEY", "unset") %>
  region: <%= ENV.fetch("YC_REGION", "ru-central1") %>
  bucket: <%= ENV.fetch("YC_BUCKET", "mediateca-prod") %>
  endpoint: <%= ENV.fetch("YC_S3_ENDPOINT", "https://storage.yandexcloud.net") %>
  force_path_style: true

