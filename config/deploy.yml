# Name of your application. Used to uniquely configure containers.
service: mediateca

# Yandex Container Registry: replace REGISTRY_ID with your registry ID from Yandex Cloud console
# (e.g. crp9xxxxxxxxxxxxxxxx).
image: crp0f2b2dotqfrc9j5h2/mediateca

# Deploy to VM in Yandex Cloud. Replace with your VM's public IP or FQDN.
servers:
  web:
    - 158.160.219.145
  # job:
  #   hosts:
  #     - YOUR_VM_IP_OR_HOSTNAME
  #   cmd: bin/jobs

# Enable SSL via Let's Encrypt (uncomment and set host when DNS points to YOUR_VM_IP_OR_HOSTNAME).
# Requires config.assume_ssl and config.force_ssl in production.rb.
#
# proxy:
#   ssl: true
#   host: mediateca.store

# Yandex Container Registry (cr.yandex). Pusher account: use registry ID as username, password in .kamal/secrets.
# Or OAuth: username "oauth", password = OAuth token. See https://cloud.yandex.ru/docs/container-registry/operations/authentication
registry:
  server: cr.yandex
  username: oauth
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - MEDIATECA_DATABASE_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true
    # DB_HOST: hostname of the db accessory on the same server (mediateca-db)
    DB_HOST: mediateca-db
    DB_PORT: "5432"
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for sqlite database files and local Active Storage files.
# Recommended to change this to a mounted volume path that is backed up off server.
volumes:
  - "mediateca_storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

  # # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server
  #
  # # Pass arguments and secrets to the Docker build process
  # args:
  #   RUBY_VERSION: ruby-3.4.7
  # secrets:
  #   - GITHUB_TOKEN
  #   - RAILS_MASTER_KEY

# Use a different ssh user than root
ssh:
  user: dim

# PostgreSQL 18 on the same VM as the app (accessory). Uses private Docker network so app connects via mediateca-db.
accessories:
  db:
    image: postgres:18
    host: 158.160.219.145
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: mediateca
        POSTGRES_DB: mediateca_production
      secret:
        - POSTGRES_PASSWORD
    files:
      - db/production_setup.sql:/docker-entrypoint-initdb.d/setup.sql
    directories:
      - data:/var/lib/postgresql/
